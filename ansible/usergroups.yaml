---
- name: Provision AD users and groups from planets.csv
  hosts: servers
  gather_facts: false

  tasks:
    - name: Ensure C:\credentials exists
      win_file:
        path: C:\credentials
        state: directory

    - name: Ensure C:\ansible exists
      win_file:
        path: C:\ansible
        state: directory

    - name: Copy planets.csv to DC
      win_copy:
        src: "{{ playbook_dir }}/planets.csv"
        dest: "C:\\ansible\\planets.csv"

    - name: Copy provisioning script to DC
      win_copy:
        src: "{{ playbook_dir }}/users.ps1"
        dest: "C:\\ansible\\users.ps1"

    - name: Run provisioning script
      win_shell: "C:\\ansible\\users.ps1"
      register: output
