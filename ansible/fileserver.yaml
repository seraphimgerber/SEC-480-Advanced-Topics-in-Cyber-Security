---
- name: Provision File Server fs-blue1
  hosts: fs-blue1
  gather_facts: false

  tasks:
    - name: Set static IP and DNS
      win_shell: |
        netsh interface ip set address "Ethernet0 2" static 10.0.5.215 255.255.255.0 10.0.5.2
        netsh interface ip set dns "Ethernet0 2" static 10.0.5.5

    - name: Set hostname
      win_hostname:
        name: fs-blue1
      register: hostname_result

    - name: Reboot after hostname change
      win_reboot:
      when: hostname_result.reboot_required

    - name: Join domain
      win_domain_membership:
        dns_domain_name: BLUE1.local
        domain_admin_user: Administrator@BLUE1.local
        domain_admin_password: Ch@mpl@ln!25
        state: domain
      register: domain_join

    - name: Reboot after domain join
      win_reboot:
      when: domain_join.reboot_required

    - name: Install File Server role
      win_feature:
        name: FS-FileServer
        state: present

    - name: Create shares for each planet type group
      win_shell: |
        $groups = @("Terrestrial", "Gas-Giant", "Ice-Giant", "Dwarf-Planet", "Super-Earth", "Sub-Neptune")
        foreach ($group in $groups) {
            $path = "C:\Shares\$group"
            New-Item -ItemType Directory -Path $path -Force
            New-SmbShare -Name $group -Path $path -FullAccess "BLUE1\$group" -ErrorAction SilentlyContinue
            Write-Host "Created share: $group"
        }
